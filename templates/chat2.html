<!doctype html>
<html>
<head>

<title>Local LLM Chat</title>

<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Socket.IO client for WebSocket communication -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
{% include 'style.css' %}
</style>

</head>

<body>

<div id="container">

    <h1>Local LLM Chat</h1>

    <!-- model selector populated by flask app -->
    Model:
    <select id="model">
        {% for m in models %}
            <option>{{ m }}</option>
        {% endfor %}
    </select>

    <!-- chat message area -->
    <div id="chat">
        {% for msg in history %}
            <div class="message {{ 'user' if msg.role == 'user' else 'bot' }}">
                {{ msg.content }}
            </div>
        {% endfor %}
    </div>

    <!-- message input controls -->
    <div id="controls">
        <textarea id="msg" rows="3" placeholder="Type a message..."></textarea>
        <button onclick="send()">Send</button>
    </div>

</div>

<script>

// create persistent Socket.IO connection
const socket = io();

// audio playback queue (reduces pauses during playback)
let audioQueue = [];
let playingAudio = false;

// Web Audio API context
const audioCtx = new AudioContext();

// play the next audio chunk in the queue
function playNextAudio() {

    // quit if the queue is empty
    if (audioQueue.length == 0) {
        playingAudio = false;
        return;
    }

    playingAudio = true;

    // remove next chunk
    const floatData = audioQueue.shift();

    // create audio buffer to store data then send data into it
    // (# channels: 1=mono, # samples, sample rate - determined by TTS app)
    const buffer = audioCtx.createBuffer( 1, floatData.length, 24000 );
    buffer.copyToChannel(floatData, 0);

    // create audio source
    const source = audioCtx.createBufferSource();
    // set buffer data to be played
    source.buffer = buffer;
    source.connect(audioCtx.destination);

    // when audio finishes, play the next segment
    source.onended = playNextAudio;

    source.start();
}

// send message to server
//   and set up new message bubbles (for user and LLM)
function send() {

    const messageBox = document.getElementById("msg");
    const message = messageBox.value;
    const model = document.getElementById("model").value;
    const chat = document.getElementById("chat");

    // no content? don't send an empty string
    if (!message.trim()) 
        return;

    // create a message bubble with the user's most recent sent text
    const userBubble = document.createElement("div");
    userBubble.className = "message user";
    chat.appendChild(userBubble);
    userBubble.innerHTML = message;
    // clear the send text area
    messageBox.value = "";
    // auto-scroll
    chat.scrollTop = chat.scrollHeight;

    // create a new message bubble to display the LLM's response text
    window.botBubble = document.createElement("div");
    botBubble.className = "message bot";
    chat.appendChild(botBubble);

    // store the text sent over in chunks 
    window.rawText = "";

    // send message via Web Socket (rather than GET/POST);
    // data will be processed (sent to LLM) by the python app
    socket.emit("send_message", {
        message: message,
        model: model
    });

}

// when text is received...
socket.on("text_chunk", function(chunk) {

    rawText += chunk;
    // render markdown via HTML
    botBubble.innerHTML = marked.parse(rawText);
    // auto-scroll
    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;

});

// when audio is received...
socket.on("audio_chunk", function(data) {

    // convert binary data to Float32Array (format used by Web Audio context)
    const floatData = new Float32Array(data);
    // add data to playback queue
    audioQueue.push(floatData);
    // start playback if not already playing
    if (!playingAudio)
        playNextAudio();

});

// when finished...
socket.on("done", function() {
    console.log("done");
});

// press enter to send text, press shift-enter for newline
document.getElementById("msg").addEventListener("keydown", function(event) {

    if (event.key === "Enter") {

        if (event.shiftKey)
            return; // allow newline

        event.preventDefault();
        send();
    }
});

</script>

</body>
</html>
