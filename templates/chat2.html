<!doctype html>
<html>
<head>

<title>Local LLM Chat</title>

<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<!-- Socket.IO client for WebSocket communication -->
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>

<style>
{% include 'style.css' %}
</style>

</head>

<body>

<div id="container">

<h1>Local LLM Chat</h1>

<!-- Model selector populated by Flask -->
Model:
<select id="model">
    {% for m in models %}
        <option>{{ m }}</option>
    {% endfor %}
</select>

<!-- Chat message area -->
<div id="chat">
    {% for msg in history %}
        <div class="message {{ 'user' if msg.role == 'user' else 'bot' }}">
            {{ msg.content }}
        </div>
    {% endfor %}
</div>

<!-- Message input controls -->
<div id="controls">
    <textarea id="msg" rows="3" placeholder="Type a message..."></textarea>
    <button onclick="send()">Send</button>
</div>

</div>

<script>

/************************************************************
CONNECT TO WEBSOCKET SERVER
************************************************************/

// Create persistent Socket.IO connection
const socket = io();

/************************************************************
AUDIO PLAYBACK QUEUE
Ensures audio segments play sequentially without gaps.
************************************************************/

let audioQueue = [];
let playingAudio = false;

// Web Audio API context
const audioCtx = new AudioContext();

// Plays the next audio chunk in the queue
function playNextAudio() {

    if (audioQueue.length === 0) {
        playingAudio = false;
        return;
    }

    playingAudio = true;

    // Remove next chunk
    const floatData = audioQueue.shift();

    // Create audio buffer
    const buffer = audioCtx.createBuffer(
        1,
        floatData.length,
        24000
    );

    buffer.copyToChannel(floatData, 0);

    // Create audio source
    const source = audioCtx.createBufferSource();
    source.buffer = buffer;
    source.connect(audioCtx.destination);

    // When audio finishes, play the next segment
    source.onended = playNextAudio;

    source.start();
}

/************************************************************
SEND MESSAGE TO SERVER
************************************************************/

function send() {

    const messageBox = document.getElementById("msg");
    const message = messageBox.value;
    const model = document.getElementById("model").value;
    const chat = document.getElementById("chat");

    if (!message.trim()) return;

    /************************************************
    Add user message bubble
    ************************************************/

    chat.innerHTML += `<div class="message user">${message}</div>`;

    messageBox.value = "";

    chat.scrollTop = chat.scrollHeight;

    /************************************************
    Create assistant message bubble (empty initially)
    ************************************************/

    window.botBubble = document.createElement("div");
    botBubble.className = "message bot";
    chat.appendChild(botBubble);

    window.rawText = "";

    /************************************************
    Send message via WebSocket
    ************************************************/

    socket.emit("send_message", {
        message: message,
        model: model
    });

}

/************************************************************
RECEIVE STREAMING TEXT FROM SERVER
************************************************************/

socket.on("text_chunk", function(chunk) {

    rawText += chunk;

    // Render Markdown → HTML
    botBubble.innerHTML = marked.parse(rawText);

    const chat = document.getElementById("chat");
    chat.scrollTop = chat.scrollHeight;

});

/************************************************************
RECEIVE AUDIO FROM SERVER
************************************************************/

socket.on("audio_chunk", function(data) {

    // Convert binary data to Float32Array
    const floatData = new Float32Array(data);

    // Add to playback queue
    audioQueue.push(floatData);

    // Start playback if not already playing
    if (!playingAudio) {
        playNextAudio();
    }

});

/************************************************************
RESPONSE FINISHED
************************************************************/

socket.on("done", function() {

    console.log("Assistant finished responding.");

});

/************************************************************
ENTER KEY HANDLING
Press Enter to send
Shift+Enter for newline
************************************************************/

document.getElementById("msg").addEventListener("keydown", function(event) {

    if (event.key === "Enter") {

        if (event.shiftKey) {
            return; // allow newline
        }

        event.preventDefault();

        send();
    }

});

</script>

</body>
</html>
